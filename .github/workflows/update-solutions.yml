name: Update solution manifest

on:
  push:
    branches: [main]
    paths:
      - "**.cpp"
      - "**.java"
      - "**.py"
      - "**.js"
      - "**.ts"
      - "**.md"
      - "scripts/generate-solutions.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-solutions.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update solutions manifest"
          file_pattern: data/solutions.json
